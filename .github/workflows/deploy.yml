name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: gisul/execution-engine-py:latest

  deploy:
    needs: build
    runs-on: self-hosted
    env:
      IMAGE: gisul/execution-engine-py:latest
      CONTAINER: execution-engine
      SANDBOX_HOST_PATH: /run/desktop/mnt/host/c/judge-sandbox
    steps:
      - name: Pull latest image
        shell: bash
        run: docker pull "$IMAGE"

      - name: Deploy container (WSL)
        shell: bash
        run: |
          set -euo pipefail

          docker rm -f "$CONTAINER" 2>/dev/null || true

          docker run -d \
            --restart unless-stopped \
            -p 8000:8000 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${SANDBOX_HOST_PATH}:/sandbox" \
            -e HOST_SANDBOX_ROOT="${SANDBOX_HOST_PATH}" \
            --name "$CONTAINER" \
            "$IMAGE"
